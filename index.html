<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Cross Street</title>

  <style>
    body {
      margin:0;
      font-family: -apple-system, system-ui;
      background:#000;
      color:#fff;
    }

    .wrap { padding:16px; }

    .label {
      font-size:12px;
      opacity:0.6;
      font-weight:800;
      margin-top:10px;
    }

    .cross {
      font-size:42px;
      font-weight:900;
      line-height:1.05;
      white-space:pre-line;
    }

    .street {
      font-size:24px;
      font-weight:800;
      margin-top:6px;
    }

    .speed {
      font-size:28px;
      font-weight:900;
      margin-top:10px;
    }

    button {
      width:100%;
      padding:14px;
      margin-top:14px;
      font-size:16px;
      font-weight:900;
      border-radius:12px;
      border:0;
      background:#0A84FF;
      color:#fff;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="label">CROSS STREET</div>
  <div class="cross" id="cross">Locating…</div>

  <div class="label">STREET</div>
  <div class="street" id="street">—</div>

  <div class="label">SPEED LIMIT</div>
  <div class="speed" id="speed">—</div>

  <button onclick="run()">Refresh</button>

</div>

<script>

const radius = 250;
const maxMainDist = 35;   // VERY tight
const maxCrossDist = 160; // looser

function toRad(d){ return d*Math.PI/180 }

function dist(aLat,aLon,bLat,bLon){
  const R=6371000;
  const dLat=toRad(bLat-aLat);
  const dLon=toRad(bLon-aLon);
  const x=Math.sin(dLat/2)**2+
  Math.cos(toRad(aLat))*Math.cos(toRad(bLat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

function parseSpeed(v){
  if(!v) return null;
  const n = String(v).match(/\d+/);
  return n ? n[0] : null;
}

function getMainStreet(ways,lat,lon){
  let best=null;

  for(const w of ways){
    const name=w.tags?.name;
    if(!name||!w.center) continue;

    const d=dist(lat,lon,w.center.lat,w.center.lon);

    if(d>maxMainDist) continue;

    if(!best||d<best.d) best={name,d};
  }

  return best?.name||"";
}

function getCross(ways,lat,lon){
  const list=[];

  for(const w of ways){
    const name=w.tags?.name;
    if(!name||!w.center) continue;

    const d=dist(lat,lon,w.center.lat,w.center.lon);

    if(d>maxCrossDist) continue;

    list.push({name,d});
  }

  list.sort((a,b)=>a.d-b.d);

  const a=list[0]?.name;
  if(!a) return "Not found";

  let b=null;
  for(const i of list){
    if(i.name!==a){ b=i.name; break; }
  }

  if(!b) return a;

  return `${a}\n& ${b}`;
}

function getSpeed(ways,lat,lon){
  let best=null;

  for(const w of ways){
    if(!w.center) continue;

    const s=parseSpeed(w.tags?.maxspeed);
    if(!s) continue;

    const d=dist(lat,lon,w.center.lat,w.center.lon);

    if(!best||d<best.d) best={s,d};
  }

  return best?.s?`${best.s} MPH`:"Unknown";
}

async function run(){

  document.getElementById("cross").innerText="Locating…";

  navigator.geolocation.getCurrentPosition(async pos=>{

    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const query=`
    [out:json];
    way(around:${radius},${lat},${lon})["highway"];
    out center tags;
    `;

    const res=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",
      body:"data="+encodeURIComponent(query)
    });

    const data=await res.json();
    const ways=data.elements;

    const cross=getCross(ways,lat,lon);
    const street=getMainStreet(ways,lat,lon);
    const speed=getSpeed(ways,lat,lon);

    document.getElementById("cross").innerText=cross;
    document.getElementById("street").innerText=street||"Unknown";
    document.getElementById("speed").innerText=speed;

  });

}

run();

</script>
</body>
</html>
